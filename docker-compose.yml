version: '3.8'

services:

  # ── DATABASE ─────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecom-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ecom-network

  # ── BACKEND ──────────────────────────────────────────────
  backend:
    build:
      context: ./ecommerce-app-backend
      dockerfile: Dockerfile
    container_name: ecom-backend
    env_file:
      - .env
    environment:
      DB_SERVER: sqlserver
      DB_NAME: ecommercedb
      DB_USER: sa
      DB_PASSWORD: YourStrong@Passw0rd
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - ecom-network
    restart: unless-stopped

  # ── FRONTEND ─────────────────────────────────────────────
  frontend:
    build:
      context: ./ecommerce-app-frontend
      dockerfile: Dockerfile
    container_name: ecom-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecom-network
    restart: unless-stopped

# ── VOLUMES & NETWORKS ───────────────────────────────────
volumes:
  sqlserver-data:

networks:
  ecom-network:
    driver: bridge
